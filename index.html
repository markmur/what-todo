<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <script>
      try {
        if (localStorage.getItem("what-todo-dark-mode") !== "false")
          document.documentElement.classList.add("dark")
      } catch (e) {}
    </script>
    <title>What Todo - Task Manager</title>
    <link rel="shortcut icon" href="/icon-128.png" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/icon-128.png" />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#151925" media="(prefers-color-scheme: dark)" />
    <meta name="referrer" content="no-referrer-when-downgrade" />

    <!-- SEO -->
    <meta name="description" content="A simple, private todo app. Organize tasks with labels, pins, dark mode, and keyboard shortcuts. All data stays in your browser." />
    <meta name="keywords" content="todo, task manager, productivity, todo app, task list, organizer" />
    <meta name="author" content="Mark Murray" />
    <link rel="canonical" href="https://what-todo.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="What Todo" />
    <meta property="og:url" content="https://what-todo.app/" />
    <meta property="og:title" content="What Todo — A simple, private task manager" />
    <meta property="og:description" content="Organize your day with labels, pins, dark mode, and keyboard shortcuts. Your data never leaves your browser." />
    <meta property="og:image" content="https://what-todo.app/og-image.png" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="800" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://what-todo.app/" />
    <meta name="twitter:title" content="What Todo — A simple, private task manager" />
    <meta name="twitter:description" content="Organize your day with labels, pins, dark mode, and keyboard shortcuts. Your data never leaves your browser." />
    <meta name="twitter:image" content="https://what-todo.app/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "What Todo",
        "url": "https://what-todo.app",
        "description": "A simple, private todo app. Organize tasks with labels, pins, dark mode, and keyboard shortcuts.",
        "applicationCategory": "ProductivityApplication",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <div id="portal"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
